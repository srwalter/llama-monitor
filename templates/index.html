<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>llama.cpp Progress Monitor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 2rem;
        }

        h1 {
            text-align: center;
            margin-bottom: 2rem;
            color: var(--accent);
            font-size: 1.8rem;
            font-weight: 600;
        }

        #status {
            text-align: center;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        #status.connected {
            color: var(--success);
        }

        #status.disconnected {
            color: var(--danger);
        }

        #tasks {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .task-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 1.25rem 1.5rem;
            border: 1px solid var(--border);
        }

        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
        }

        .task-label {
            font-weight: 600;
            font-size: 1rem;
            color: var(--accent-light);
        }

        .task-meta {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .progress-bar-container {
            width: 100%;
            height: 24px;
            background: var(--bg);
            border-radius: 6px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar-fill {
            height: 100%;
            background: var(--progress-gradient);
            border-radius: 6px;
            transition: width 0.3s ease;
            min-width: 0;
        }

        .progress-bar-fill.complete {
            background: var(--progress-complete-gradient);
        }

        .progress-text {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.8rem;
            font-weight: 600;
            color: #fff;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
        }

        .timing-section {
            margin-top: 0.75rem;
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
        }

        .timing-item {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .timing-item span {
            font-weight: 600;
            color: var(--text);
        }

        .timing-item .label {
            color: var(--text-muted);
            margin-right: 0.25rem;
        }

        .no-tasks {
            text-align: center;
            color: var(--text-dim);
            padding: 3rem;
            font-size: 1rem;
        }

        #controls {
            max-width: 900px;
            margin: 0 auto 1rem;
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .toggle-btn {
            background: var(--card-bg);
            border: 1px solid var(--border);
            color: var(--accent-light);
            padding: 0.5rem 1.25rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: background 0.2s;
        }

        .toggle-btn:hover {
            background: var(--border);
        }

        .toggle-btn.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        #theme-select {
            background: var(--card-bg);
            border: 1px solid var(--border);
            color: var(--accent-light);
            padding: 0.5rem 0.75rem;
            border-radius: 8px;
            font-size: 0.85rem;
            cursor: pointer;
            outline: none;
            transition: border-color 0.2s;
        }

        #theme-select:hover,
        #theme-select:focus {
            border-color: var(--accent);
        }

        #theme-select option {
            background: var(--card-bg);
            color: var(--text);
        }

        #log-viewer {
            max-width: 900px;
            margin: 0 auto 1rem;
            background: var(--log-bg);
            border-radius: 12px;
            border: 1px solid var(--border);
            display: none;
            max-height: 400px;
            overflow: hidden;
        }

        #log-viewer.visible {
            display: block;
        }

        #log-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border);
        }

        #log-header span {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        #log-content {
            font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
            font-size: 0.75rem;
            line-height: 1.5;
            padding: 0.75rem;
            max-height: 350px;
            overflow-y: auto;
            color: var(--text-muted);
            white-space: pre-wrap;
            word-break: break-all;
        }

        #log-content .log-line {
            border-bottom: 1px solid var(--border-subtle);
            padding: 0.1rem 0;
        }

        #log-content .log-line:nth-child(odd) {
            background: var(--line-bg);
        }

        #log-content .log-line.progress {
            color: var(--accent-light);
        }

        #log-content .log-line.timing {
            color: var(--success);
        }

        #log-content .log-line.other {
            color: var(--text-muted);
        }

        #log-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 1rem;
            border-top: 1px solid var(--border);
            font-size: 0.75rem;
            color: var(--text-dim);
        }

        #gpu-monitor {
            max-width: 900px;
            margin: 0 auto 1rem;
            background: var(--card-bg);
            border-radius: 12px;
            border: 1px solid var(--border);
            padding: 1.25rem 1.5rem;
        }

        #gpu-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
        }

        #gpu-title {
            font-weight: 600;
            font-size: 1rem;
            color: var(--accent-light);
        }

        #gpu-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text);
        }

        #gpu-canvas {
            width: 100%;
            height: 120px;
            display: block;
        }

        #clippy {
            position: fixed;
            bottom: -120px;
            left: 30px;
            z-index: 1000;
            transition: bottom 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            cursor: pointer;
            filter: drop-shadow(0 4px 12px rgba(0,0,0,0.4));
        }

        #clippy.visible {
            bottom: 30px;
        }

        #clippy .speech-bubble {
            position: absolute;
            bottom: 100%;
            left: 50px;
            width: 300px;
            background: var(--bubble-bg);
            color: var(--bubble-text);
            border-radius: 16px;
            padding: 1rem 1.25rem;
            font-size: 0.9rem;
            line-height: 1.4;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin-bottom: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.2);
            opacity: 0;
            transform: scale(0.8);
            transition: opacity 0.3s ease, transform 0.3s ease;
            pointer-events: none;
        }

        #clippy.visible .speech-bubble {
            opacity: 1;
            transform: scale(1);
        }

        #clippy .speech-bubble::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 12px;
            width: 0;
            height: 0;
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-top: 8px solid var(--bubble-bg);
        }

        #clippy svg {
            width: 80px;
            height: 80px;
        }

        #clippy .eye {
            animation: blink 3s infinite;
        }

        @keyframes blink {
            0%, 95%, 100% { transform: scaleY(1); }
            97% { transform: scaleY(0.1); }
        }

        #clippy.waving svg {
            animation: wave 0.6s ease-in-out;
            transform-origin: 40px 80px;
        }

        @keyframes wave {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-15deg); }
            75% { transform: rotate(15deg); }
        }

        /* Theme: Midnight (default) */
        body {
            --bg: #0f1117;
            --card-bg: #1a1d27;
            --log-bg: #0a0c10;
            --text: #e0e0e0;
            --text-muted: #888;
            --text-dim: #555;
            --accent: #7c3aed;
            --accent-light: #c4b5fd;
            --accent-dim: #a78bfa;
            --border: #2a2d3a;
            --border-subtle: #1a1d27;
            --line-bg: rgba(255,255,255,0.02);
            --grid-color: #2a2d3a;
            --success: #22c55e;
            --danger: #ef4444;
            --progress-gradient: linear-gradient(90deg, #7c3aed, #a78bfa);
            --progress-complete-gradient: linear-gradient(90deg, #22c55e, #4ade80);
            --bubble-bg: #fff;
            --bubble-text: #333;
        }

        /* Theme: Ocean */
        body.theme-ocean {
            --bg: #0a192f;
            --card-bg: #112240;
            --log-bg: #060d1a;
            --text: #ccd6f6;
            --text-muted: #8892b0;
            --text-dim: #5a6a8a;
            --accent: #06b6d4;
            --accent-light: #67e8f9;
            --accent-dim: #22d3ee;
            --border: #1e3a5f;
            --border-subtle: #112240;
            --line-bg: rgba(6,182,212,0.04);
            --grid-color: #1e3a5f;
            --success: #34d399;
            --danger: #f87171;
            --progress-gradient: linear-gradient(90deg, #06b6d4, #22d3ee);
            --progress-complete-gradient: linear-gradient(90deg, #34d399, #6ee7b7);
            --bubble-bg: #fff;
            --bubble-text: #1a202c;
        }

        /* Theme: Ember */
        body.theme-ember {
            --bg: #1a1410;
            --card-bg: #2a1f15;
            --log-bg: #120e08;
            --text: #f0e6d8;
            --text-muted: #a89070;
            --text-dim: #6a5540;
            --accent: #f59e0b;
            --accent-light: #fbbf24;
            --accent-dim: #fbbf24;
            --border: #3d2e1e;
            --border-subtle: #2a1f15;
            --line-bg: rgba(245,158,11,0.04);
            --grid-color: #3d2e1e;
            --success: #4ade80;
            --danger: #fb7185;
            --progress-gradient: linear-gradient(90deg, #f59e0b, #fbbf24);
            --progress-complete-gradient: linear-gradient(90deg, #4ade80, #86efac);
            --bubble-bg: #fff;
            --bubble-text: #1a202c;
        }

        /* Theme: Dracula */
        body.theme-dracula {
            --bg: #282a36;
            --card-bg: #343746;
            --log-bg: #1e1f29;
            --text: #f8f8f2;
            --text-muted: #b0b0a0;
            --text-dim: #6a6a5e;
            --accent: #bd93f9;
            --accent-light: #d4b0ff;
            --accent-dim: #d4b0ff;
            --border: #44475a;
            --border-subtle: #343746;
            --line-bg: rgba(189,147,249,0.04);
            --grid-color: #44475a;
            --success: #50fa7b;
            --danger: #ff5555;
            --progress-gradient: linear-gradient(90deg, #bd93f9, #d4b0ff);
            --progress-complete-gradient: linear-gradient(90deg, #50fa7b, #86efac);
            --bubble-bg: #282a36;
            --bubble-text: #f8f8f2;
        }

        /* Theme: Light */
        body.theme-light {
            --bg: #f5f5f5;
            --card-bg: #fff;
            --log-bg: #fafafa;
            --text: #1a1a1a;
            --text-muted: #666;
            --text-dim: #999;
            --accent: #7c3aed;
            --accent-light: #a78bfa;
            --accent-dim: #a78bfa;
            --border: #e0e0e0;
            --border-subtle: #eee;
            --line-bg: rgba(0,0,0,0.02);
            --grid-color: #e0e0e0;
            --success: #22c55e;
            --danger: #ef4444;
            --progress-gradient: linear-gradient(90deg, #7c3aed, #a78bfa);
            --progress-complete-gradient: linear-gradient(90deg, #22c55e, #4ade80);
            --bubble-bg: #fff;
            --bubble-text: #333;
        }
    </style>
</head>
<body>
    <h1>llama.cpp Progress Monitor</h1>
      <div id="status" class="disconnected">Connecting...</div>
    <div id="gpu-monitor">
        <div id="gpu-header">
            <span id="gpu-title">GPU Utilization</span>
            <span id="gpu-value">0%</span>
        </div>
        <canvas id="gpu-canvas"></canvas>
    </div>
    <div id="tasks">
        <div class="no-tasks">Waiting for progress data...</div>
    </div>

    <div id="controls">
        <select id="theme-select" title="Theme">
            <option value="midnight">Midnight</option>
            <option value="ocean">Ocean</option>
            <option value="ember">Ember</option>
            <option value="dracula">Dracula</option>
            <option value="light">Light</option>
        </select>
        <button class="toggle-btn" id="toggle-logs">Show Logs</button>
        <button class="toggle-btn" id="clear-tasks">Clear Tasks</button>
    </div>

    <div id="log-viewer">
        <div id="log-header">
            <span>Live Logs</span>
            <span id="log-count">0 lines</span>
        </div>
        <div id="log-content"></div>
        <div id="log-footer">
            <span id="log-status">Buffer: 0 lines</span>
            <button class="toggle-btn" id="toggle-autoscroll" style="padding:0.25rem 0.75rem;font-size:0.75rem;">Autoscroll: ON</button>
        </div>
    </div>

    <div id="clippy" title="Need help?">
        <div class="speech-bubble" id="clippy-bubble"></div>
        <svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
            <!-- Body - paperclip shape -->
            <path id="clippy-body" d="M40 8 C40 8 28 8 28 20 C28 30 36 32 36 42 C36 50 30 54 30 62 C30 70 36 74 42 74 C48 74 50 68 50 62 L50 30 C50 20 44 14 36 14 C28 14 22 20 22 28"
                  fill="none" stroke="var(--accent)" stroke-width="5" stroke-linecap="round"/>
            <!-- Left eye -->
            <ellipse class="eye" id="clippy-eye-l" cx="30" cy="24" rx="4" ry="4.5" fill="var(--bg)"/>
            <!-- Right eye -->
            <ellipse class="eye" id="clippy-eye-r" cx="42" cy="24" rx="4" ry="4.5" fill="var(--bg)"/>
            <!-- Eye shine -->
            <ellipse cx="31.5" cy="22.5" rx="1.5" ry="1.5" fill="#fff"/>
            <ellipse cx="43.5" cy="22.5" rx="1.5" ry="1.5" fill="#fff"/>
            <!-- Smile -->
            <path id="clippy-smile" d="M33 32 Q36 36 40 32" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round"/>
            <!-- Blush -->
            <ellipse cx="26" cy="30" rx="3" ry="2" fill="var(--accent-dim)" opacity="0.4"/>
            <ellipse cx="46" cy="30" rx="3" ry="2" fill="var(--accent-dim)" opacity="0.4"/>
        </svg>
    </div>

    <script>
        const tasks = {};
        const taskData = {};
        const COMPLETED_COLLAPSE_MS = 30000;
        const tasksContainer = document.getElementById('tasks');
        const statusEl = document.getElementById('status');

        function createTaskCard(slot, task) {
            const id = `task-${slot}-${task}`;
            const card = document.createElement('div');
            card.className = 'task-card';
            card.id = id;
            card.innerHTML = `
                <div class="task-header">
                    <span class="task-label">Task ${task}</span>
                    <span class="task-meta">Slot ${slot}</span>
                </div>
                <div class="progress-bar-container">
                    <div class="progress-bar-fill" style="width: 0%"></div>
                    <span class="progress-text">0%</span>
                </div>
                <div class="timing-section"></div>
            `;
            return card;
        }

        function updateTask(slot, task, progress) {
            const key = slot + '-' + task;
            const id = `task-${slot}-${task}`;
            let card = document.getElementById(id);
            if (!card) {
                card = createTaskCard(slot, task);
                tasksContainer.prepend(card);
            }

            if (!taskData[key]) {
                taskData[key] = { completed: false, completedAt: 0, progress: 0 };
            }

            const fill = card.querySelector('.progress-bar-fill');
            const text = card.querySelector('.progress-text');
            const pct = Math.round(progress * 100);

            fill.style.width = `${pct}%`;
            text.textContent = `${pct}%`;

            if (progress >= 1.0 && !taskData[key].completed) {
                fill.classList.add('complete');
                text.textContent = 'Done';
                taskData[key] = { completed: true, completedAt: Date.now(), progress: 1.0 };
            } else if (progress < 1.0) {
                taskData[key] = { completed: false, completedAt: 0, progress };
            }
        }

        function collapseCompletedTasks() {
            const now = Date.now();
            for (const [key, data] of Object.entries(taskData)) {
                if (data.completed && data.completedAt > 0 && (now - data.completedAt) > COMPLETED_COLLAPSE_MS) {
                    const [slot, task] = key.split('-');
                    const id = `task-${slot}-${task}`;
                    const card = document.getElementById(id);
                    if (card) {
                        card.style.opacity = '0.3';
                        card.style.pointerEvents = 'none';
                        const text = card.querySelector('.progress-text');
                        if (text) {
                            const elapsed = Math.round((now - data.completedAt) / 1000);
                            text.textContent = `Done (${elapsed}s ago)`;
                        }
                    }
                }
            }
        }

        setInterval(collapseCompletedTasks, 5000);

        function updateTiming(slot, task, promptTps, evalTps) {
            const id = `task-${slot}-${task}`;
            let card = document.getElementById(id);
            if (!card) {
                card = createTaskCard(slot, task);
                tasksContainer.prepend(card);
            }

            const timingSection = card.querySelector('.timing-section');
            let html = '';
            if (promptTps > 0) {
                html += `<div class="timing-item"><span class="label">Prompt:</span> <span>${promptTps.toFixed(1)} t/s</span></div>`;
            }
            if (evalTps > 0) {
                html += `<div class="timing-item"><span class="label">Eval:</span> <span>${evalTps.toFixed(1)} t/s</span></div>`;
            }
            timingSection.innerHTML = html;
        }

        const logViewer = document.getElementById('log-viewer');
        const logContent = document.getElementById('log-content');
        const logCount = document.getElementById('log-count');
        const logStatus = document.getElementById('log-status');
        const toggleLogsBtn = document.getElementById('toggle-logs');
        const clearTasksBtn = document.getElementById('clear-tasks');
        const toggleAutoscrollBtn = document.getElementById('toggle-autoscroll');
        let logBuffer = [];
        let maxLogLines = 500;
        let autoscroll = true;
        let totalLogLines = 0;
        let logEvtSource = null;
        let renderRAF = null;
        let logDirty = false;

        toggleLogsBtn.addEventListener('click', () => {
            const isVisible = logViewer.classList.toggle('visible');
            toggleLogsBtn.classList.toggle('active', isVisible);
            toggleLogsBtn.textContent = isVisible ? 'Hide Logs' : 'Show Logs';
            if (isVisible && !logEvtSource) {
                startLogConnection();
            } else if (!isVisible) {
                stopLogConnection();
            }
            if (isVisible) {
                logContent.scrollTop = logContent.scrollHeight;
            }
        });

        toggleAutoscrollBtn.addEventListener('click', () => {
            autoscroll = !autoscroll;
            toggleAutoscrollBtn.textContent = `Autoscroll: ${autoscroll ? 'ON' : 'OFF'}`;
            toggleAutoscrollBtn.classList.toggle('active', autoscroll);
        });

        clearTasksBtn.addEventListener('click', () => {
            if (confirm('Clear all task cards?')) {
                tasksContainer.innerHTML = '<div class="no-tasks">Waiting for progress data...</div>';
                Object.keys(tasks).forEach(k => delete tasks[k]);
            }
        });

        function addLogEntry(message) {
            totalLogLines++;
            logBuffer.push({ message, time: Date.now(), total: totalLogLines });
            if (logBuffer.length > maxLogLines) {
                logBuffer = logBuffer.slice(-maxLogLines);
            }
            logDirty = true;
            if (!renderRAF) {
                renderRAF = requestAnimationFrame(() => {
                    renderLogLines();
                    renderRAF = null;
                });
            }
        }

        function renderLogLines() {
            logCount.textContent = `${totalLogLines.toLocaleString()} lines`;
            logStatus.textContent = `Buffer: ${logBuffer.length.toLocaleString()} lines`;

            const fragment = document.createDocumentFragment();
            for (const entry of logBuffer) {
                const div = document.createElement('div');
                div.className = 'log-line';
                const msg = entry.message;
                if (msg.includes('progress')) {
                    div.classList.add('progress');
                } else if (msg.includes('time =') || msg.includes('print_timing')) {
                    div.classList.add('timing');
                } else {
                    div.classList.add('other');
                }
                div.textContent = `${entry.total}. ${msg}`;
                fragment.appendChild(div);
            }

            const wasAtBottom = logContent.scrollHeight - logContent.scrollTop <= logContent.clientHeight + 50;
            logContent.innerHTML = '';
            logContent.appendChild(fragment);
            if (autoscroll && wasAtBottom) {
                logContent.scrollTop = logContent.scrollHeight;
            }
        }

        function startLogConnection() {
            logBuffer = [];
            totalLogLines = 0;
            logEvtSource = new EventSource('/logs');
            logEvtSource.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    if (data.type === 'log') {
                        addLogEntry(data.message);
                    }
                } catch (e) {
                    console.error('Failed to parse log SSE data:', event.data);
                }
            };
            logEvtSource.onerror = () => {
                logEvtSource.close();
                logEvtSource = null;
            };
        }

        function stopLogConnection() {
            if (logEvtSource) {
                logEvtSource.close();
                logEvtSource = null;
            }
        }

        const gpuCanvas = document.getElementById('gpu-canvas');
        const gpuCtx = gpuCanvas.getContext('2d');
        const gpuValueEl = document.getElementById('gpu-value');
        const gpuHistory = [];
        const MAX_GPU_POINTS = 120;
        let gpuEvtSource = null;

        function resizeGpuCanvas() {
            const rect = gpuCanvas.parentElement.getBoundingClientRect();
            gpuCanvas.width = rect.width - 48;
            gpuCanvas.height = 120;
        }

        function hexToRgb(hex) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return `${r}, ${g}, ${b}`;
        }

        function getThemeColor(varName) {
            return getComputedStyle(document.body).getPropertyValue(varName).trim();
        }

        function drawGpuGraph() {
            const w = gpuCanvas.width;
            const h = gpuCanvas.height;
            gpuCtx.clearRect(0, 0, w, h);

            if (gpuHistory.length < 2) return;

            const padding = { top: 10, bottom: 10, left: 0, right: 0 };
            const graphW = w - padding.left - padding.right;
            const graphH = h - padding.top - padding.bottom;

            // Grid lines
            const gridColor = getThemeColor('--grid-color');
            gpuCtx.strokeStyle = gridColor;
            gpuCtx.lineWidth = 1;
            for (let i = 0; i <= 4; i++) {
                const y = padding.top + (graphH / 4) * i;
                gpuCtx.beginPath();
                gpuCtx.moveTo(padding.left, y);
                gpuCtx.lineTo(w - padding.right, y);
                gpuCtx.stroke();
            }

            // Line
            const accent = getThemeColor('--accent');
            const gradient = gpuCtx.createLinearGradient(0, padding.top, 0, h - padding.bottom);
            gradient.addColorStop(0, `rgba(${hexToRgb(accent)}, 0.8)`);
            gradient.addColorStop(1, `rgba(${hexToRgb(accent)}, 0.1)`);

            gpuCtx.beginPath();
            gpuCtx.strokeStyle = accent;
            gpuCtx.lineWidth = 2;

            const step = graphW / (MAX_GPU_POINTS - 1);
            for (let i = 0; i < gpuHistory.length; i++) {
                const x = padding.left + i * step;
                const y = padding.top + graphH - (gpuHistory[i] / 100) * graphH;
                if (i === 0) {
                    gpuCtx.moveTo(x, y);
                } else {
                    gpuCtx.lineTo(x, y);
                }
            }
            gpuCtx.stroke();

            // Fill under line
            const lastX = padding.left + (gpuHistory.length - 1) * step;
            const lastY = padding.top + graphH - (gpuHistory[gpuHistory.length - 1] / 100) * graphH;
            gpuCtx.lineTo(lastX, h - padding.bottom);
            gpuCtx.lineTo(padding.left, h - padding.bottom);
            gpuCtx.closePath();
            gpuCtx.fillStyle = gradient;
            gpuCtx.fill();
        }

        function updateGpuData(data) {
            gpuValueEl.textContent = data.utilization + '%';
            gpuHistory.push(data.utilization);
            if (gpuHistory.length > MAX_GPU_POINTS) {
                gpuHistory.shift();
            }
            resizeGpuCanvas();
            drawGpuGraph();
            updateClippy(data.utilization);
        }

        const clippy = document.getElementById('clippy');
        const clippyBubble = document.getElementById('clippy-bubble');
        const clippyMessages = [
            "It looks like you're generating tokens!",
            "Need a hand with that inference?",
            "I see you're running some LLMs!",
            "GPU is busy! Want me to help?",
            "Looks like someone's doing some AI work!",
            "I'm here if you need me!",
            "Tokens per second looking good!",
            "Keep 'em coming!",
            "Your GPU is having fun!",
            "Prompt processing in progress!",
        ];

        let clippyVisible = false;
        let clippyTimeout = null;

        function updateClippy(util) {
            if (util > 0 && !clippyVisible) {
                clippyVisible = true;
                clippy.classList.add('visible');
                clippy.classList.add('waving');
                clippyBubble.textContent = clippyMessages[Math.floor(Math.random() * clippyMessages.length)];
                clearTimeout(clippyTimeout);
                clippyTimeout = setTimeout(() => {
                    clippy.classList.remove('waving');
                }, 600);
            } else if (util === 0 && clippyVisible) {
                clippyVisible = false;
                clippy.classList.remove('visible');
                clippyBubble.textContent = '';
            }

            if (util > 0 && clippyVisible) {
                if (util > 80) {
                    clippyBubble.textContent = "Wow, that's intense! 🔥";
                } else if (util > 50) {
                    clippyBubble.textContent = "Good workload!";
                }

                clearTimeout(clippyTimeout);
                clippyTimeout = setTimeout(() => {
                    if (clippyVisible) {
                        clippyBubble.textContent = clippyMessages[Math.floor(Math.random() * clippyMessages.length)];
                    }
                }, 5000);
            }
        }

        function startGpuConnection() {
            gpuHistory.length = 0;
            gpuEvtSource = new EventSource('/gpu');
            gpuEvtSource.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    if (data.type === 'gpu') {
                        updateGpuData(data);
                    }
                } catch (e) {
                    console.error('Failed to parse GPU SSE data:', event.data);
                }
            };
            gpuEvtSource.onerror = () => {
                gpuEvtSource.close();
                gpuEvtSource = null;
            };
        }

        startGpuConnection();
        window.addEventListener('resize', resizeGpuCanvas);

        let evtSource = null;
        let reconnectAttempts = 0;
        let maxReconnectAttempts = 30;
        let lastActivityTime = Date.now();
        let inactivityTimer = null;
        const RECONNECT_DELAY = 2000;

        function connect() {
            if (evtSource) {
                evtSource.close();
            }
            evtSource = new EventSource('/events');
            reconnectAttempts++;

            evtSource.onopen = () => {
                statusEl.textContent = 'Connected';
                statusEl.className = 'connected';
                reconnectAttempts = 0;
                lastActivityTime = Date.now();
                resetInactivityTimer();
            };

            evtSource.onmessage = (event) => {
                lastActivityTime = Date.now();
                resetInactivityTimer();
                try {
                    const data = JSON.parse(event.data);
                    if (data.type === 'progress') {
                        updateTask(data.slot, data.task, data.progress);
                    } else if (data.type === 'timing') {
                        updateTiming(data.slot, data.task, data.prompt_tps, data.eval_tps);
                    }
                } catch (e) {
                    console.error('Failed to parse SSE data:', event.data);
                }
            };

            evtSource.onerror = () => {
                if (evtSource.readyState === EventSource.CLOSED) {
                    statusEl.textContent = 'Connection closed';
                    statusEl.className = 'disconnected';
                    return;
                }
                reconnectAttempts++;
                const delay = Math.min(RECONNECT_DELAY * Math.min(reconnectAttempts, 10), 30000);
                statusEl.textContent = `Disconnected - reconnecting in ${delay/1000}s (attempt ${reconnectAttempts})...`;
                statusEl.className = 'disconnected';
                evtSource.close();
                setTimeout(connect, delay);
            };
        }

        function resetInactivityTimer() {
            if (inactivityTimer) clearTimeout(inactivityTimer);
            inactivityTimer = setTimeout(() => {
                if (evtSource && evtSource.readyState !== EventSource.OPEN) {
                    statusEl.textContent = 'No data received - reconnecting...';
                    statusEl.className = 'disconnected';
                    evtSource.close();
                    setTimeout(connect, 3000);
                }
            }, 60000);
        }

        connect();

        // Theme switcher
        const themeSelect = document.getElementById('theme-select');
        const savedTheme = localStorage.getItem('llama-monitor-theme');

        function applyTheme(theme) {
            document.body.classList.remove('theme-ocean', 'theme-ember', 'theme-dracula', 'theme-light');
            if (theme !== 'midnight') {
                document.body.classList.add(`theme-${theme}`);
            }
            themeSelect.value = theme;
            localStorage.setItem('llama-monitor-theme', theme);
            // Redraw GPU graph with new theme colors
            drawGpuGraph();
        }

        if (savedTheme) {
            applyTheme(savedTheme);
        } else {
            applyTheme('midnight');
        }

        themeSelect.addEventListener('change', (e) => {
            applyTheme(e.target.value);
        });
    </script>
</body>
